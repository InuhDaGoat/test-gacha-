<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body { background: black; color: white; font-family: Arial; text-align:center; }

    input, button { padding:10px; margin:5px; }
  </style>
</head>
<body>

<div class="box">
  <h2>🚀 Space Gacha Login</h2>
  <input id="username" placeholder="Username"><br>
  <button onclick="login()">Login</button>
  <p id="status"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = window.supabase.createClient(
"https://galsberhhslhbnesagcc.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhbHNiZXJoaHNsaGJuZXNhZ2NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNDg5MTMsImV4cCI6MjA4OTgyNDkxM30.IZzm9ukiyolJm0uUlZfGIqkRpbQvetGhCNI-bP7dtJk"
);

async function login() {
  let name = document.getElementById("username").value;

  if (!name) {
    document.getElementById("status").innerText = "Isi username dulu.";
    return;
  }
  window.location.href = "index.html?user=" + name; 


  document.getElementById("status").innerText = "Loading...";

  let { data, error } = await supabase
    .from("users")
    .select("*")
    .eq("username", name)
    .single();

  if (error) {
    let res = await supabase.from("users").insert([
      { username: name, currency: 100, pity: 0 }
    ]).select().single();

    data = res.data;
  }

  window.location.href = "index.html?user=" + name;
}
</script>
