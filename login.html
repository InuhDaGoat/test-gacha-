<!DOCTYPE html>
<html>
<head>
  <title>Space Gacha Login</title>
  <style>
    body { background:black; color:white; font-family:Arial; text-align:center; }
    .box { margin-top: 100px; }
    input, button { padding:10px; margin:5px; width:200px; }
  </style>
</head>
<body>
<div class="box">
  <h2>🚀 Space Gacha Login</h2>
  <input id="email" placeholder="Email" type="email"><br>
  <input id="password" placeholder="Password" type="password"><br>
  <button onclick="login()">Login</button>
  <button onclick="signup()">Register</button>
  <p id="status"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Isi semua field dulu!");
    return;
  }

  try {
    console.log("Kirim request login ke Supabase...");
    
    // Supabase v2 syntax
    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: password
    });

    console.log("Response data:", data, "Error:", error);

    if (error) {
      alert("Login gagal: " + error.message);
      return;
    }

    // Kalau sukses, redirect otomatis
    window.location.href = "index.html";

  } catch (err) {
    alert("Error JS: " + err.message);
  }
}

async function signup() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if (!email || !password) { document.getElementById("status").innerText = "Isi semua!"; return; }

  document.getElementById("status").innerText = "Loading...";
  const { data, error } = await supabase.auth.signUp({ email, password });

  if (error) { document.getElementById("status").innerText = error.message; return; }

  document.getElementById("status").innerText = "Registrasi berhasil! Login sekarang.";
}
</script>
</body>
</html>
