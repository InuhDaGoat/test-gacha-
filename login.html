<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Space Gacha Login</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
    }
    input, button {
      padding: 10px;
      margin: 5px;
      width: 220px;
    }
    button {
      cursor: pointer;
    }
    #status {
      margin-top: 15px;
      color: #f00;
    }
  </style>
</head>
<body>

<h2>🚀 Space Gacha Login</h2>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<button onclick="signup()">Register</button>
<p id="status"></p>

<!-- Supabase v2 library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // Initialize Supabase client
  const SUPABASE_URL = "https://galsberhhslhbnesagcc.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhbHNiZXJoaHNsaGJuZXNhZ2NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNDg5MTMsImV4cCI6MjA4OTgyNDkxM30.IZzm9ukiyolJm0uUlZfGIqkRpbQvetGhCNI-bP7dtJk";
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Login function
  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const status = document.getElementById("status");

    if (!email || !password) {
      status.innerText = "Isi email dan password!";
      return;
    }

    try {
      status.innerText = "Loading...";
      console.log("Kirim request login...");
      const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
      });

      console.log("DATA:", data, "ERROR:", error);

      if (error) {
        status.innerText = error.message;
        return;
      }

      // Redirect ke index
      window.location.href = "index.html";

    } catch (err) {
      console.error(err);
      status.innerText = "Error: " + err.message;
    }
  }

  // Register function
  async function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const status = document.getElementById("status");

    if (!email || !password) {
      status.innerText = "Isi email dan password!";
      return;
    }

    try {
      status.innerText = "Loading...";
      const { data, error } = await supabase.auth.signUp({
        email: email,
        password: password
      });

      console.log("DATA:", data, "ERROR:", error);

      if (error) {
        status.innerText = error.message;
        return;
      }

      status.innerText = "Registrasi berhasil! Silakan login.";

    } catch (err) {
      console.error(err);
      status.innerText = "Error: " + err.message;
    }
  }

  // expose functions untuk HTML
  window.login = login;
  window.signup = signup;
</script>

</body>
</html>
